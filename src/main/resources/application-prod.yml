spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

repit:
  api-server:
    base-url: ${API_SERVER_URL:http://localhost:8080}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: ${ANTHROPIC_MODEL:claude-3-5-haiku-latest}