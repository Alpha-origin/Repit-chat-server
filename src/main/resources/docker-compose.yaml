services:
  redis:
    image: redis:7-alpine
    container_name: repit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  chat:
    build: .
    image: repit-chat
    container_name: repit-chat
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_SERVER_URL: http://host.docker.internal:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:claude-3-5-haiku-latest}
    restart: unless-stopped